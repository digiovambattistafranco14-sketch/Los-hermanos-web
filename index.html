<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Los Hermanos — Carta</title>
<meta name="description" content="Los Hermanos, City Bell. Carta completa: entradas, parrilla, pastas caseras, pescados, postres y carta de vinos.">
<link rel="icon" href="assets/img/logo-mark.png" type="image/png">
<link rel="apple-touch-icon" href="assets/img/logo-mark.png">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- sprite de iconos, no visible -->
<div id="sprite-holder" aria-hidden="true"></div>

<a class="visually-hidden" href="#contenido">Saltar al contenido</a>

<header class="site-header" id="siteHeader">
  <div class="site-header__bar">
    <a class="brand" href="#portada" aria-label="Los Hermanos, ir al inicio">
      <span class="brand__mark"><img src="assets/img/logo-mark.png" alt="" width="40" height="40"></span>
      <span class="brand__name">Los Hermanos</span>
    </a>

    <nav class="index-nav" aria-label="Secciones de la carta">
      <ul class="index-nav__list" id="indexNavList"><!-- generado por JS --></ul>
    </nav>

    <button class="menu-toggle" id="menuToggle" aria-haspopup="true" aria-expanded="false" aria-controls="indexOverlay">
      Índice
    </button>
  </div>
</header>

<div class="index-overlay" id="indexOverlay">
  <div class="index-overlay__head">
    <span class="index-overlay__title">Índice de la carta</span>
    <button class="index-overlay__close" id="indexOverlayClose" aria-label="Cerrar índice">&times;</button>
  </div>
  <div class="index-overlay__body">
    <ul class="index-overlay__list" id="indexOverlayList"><!-- generado por JS --></ul>
  </div>
</div>

<main id="contenido">

  <section class="hero" id="portada">
    <div class="hero__frame" aria-hidden="true"></div>
    <img class="hero__logo" src="assets/img/logo-full.png" alt="Los Hermanos, City Bell">
    <div class="hero__menu-row">
      <span class="hero__menu-line" aria-hidden="true"></span>
      <h1 class="hero__menu-label">Menú</h1>
      <span class="hero__menu-line" aria-hidden="true"></span>
    </div>
    <p class="hero__tagline" id="heroTagline"><!-- generado por JS --></p>
    <a class="hero__scroll" href="#entradas">
      <span>La carta</span>
      <svg viewBox="0 0 14 20" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M7 1 V19 M2 14 L7 19 L12 14"/></svg>
    </a>
  </section>

  <div class="info-strip">
    <div class="info-strip__inner" id="infoStrip"><!-- generado por JS --></div>
  </div>

  <div class="container">
    <section class="menu-main" id="menuMain"><!-- generado por JS --></section>
  </div>

</main>

<footer class="site-footer">
  <div class="container container--wide">
    <div>
      <img class="footer__mark" src="assets/img/logo-full.png" alt="Los Hermanos, City Bell" width="240" height="153">
      <p class="footer__tagline">La casa se reserva el derecho de admisión y permanencia.</p>
    </div>
    <div>
      <h4>Ubicación</h4>
      <address id="footerAddress"><!-- JS --></address>
      <p><a href="#" id="footerMapsLink" target="_blank" rel="noopener">Cómo llegar &rarr;</a></p>
    </div>
    <div>
      <h4>Horario</h4>
      <p id="footerHours"><!-- JS --></p>
      <h4 style="margin-top:22px">Contacto</h4>
      <p><a href="#" id="footerWhatsappLink" target="_blank" rel="noopener"></a></p>
    </div>
    <div>
      <h4>Medios de pago</h4>
      <p id="footerPayments"><!-- JS --></p>
    </div>
  </div>
  <div class="footer__bottom">
    Los Hermanos © <span id="year"></span> — Carta sujeta a modificaciones sin previo aviso.
    · Iconos por <a href="https://openmoji.org" target="_blank" rel="noopener">OpenMoji</a> (CC BY-SA 4.0)
  </div>
</footer>

<a class="whatsapp-fab" id="whatsappFab" href="#" target="_blank" rel="noopener" aria-label="Escribinos por WhatsApp">
  <svg viewBox="0 0 32 32" aria-hidden="true" fill="currentColor">
    <path d="M16.02 3C9.4 3 4 8.36 4 14.98c0 2.2.6 4.26 1.66 6.04L4 29l8.2-1.62a12.9 12.9 0 0 0 3.82.58h.01c6.62 0 12.02-5.36 12.02-11.98C28.05 8.36 22.65 3 16.02 3zm0 21.8c-1.9 0-3.75-.5-5.36-1.46l-.38-.22-4.86.96.98-4.76-.25-.4a9.83 9.83 0 0 1-1.5-5.24c0-5.44 4.44-9.86 9.9-9.86 5.44 0 9.87 4.4 9.87 9.86 0 5.44-4.43 9.86-9.9 9.86zm5.42-7.38c-.3-.15-1.76-.87-2.03-.97-.27-.1-.47-.15-.67.15-.2.3-.77.97-.94 1.16-.17.2-.35.22-.65.07-.3-.15-1.24-.46-2.37-1.47-.87-.78-1.46-1.74-1.63-2.04-.17-.3-.02-.46.13-.6.13-.13.3-.35.45-.52.15-.17.2-.3.3-.5.1-.2.05-.37-.02-.52-.07-.15-.67-1.63-.92-2.23-.24-.58-.49-.5-.67-.5-.17 0-.37-.02-.57-.02-.2 0-.52.07-.79.37-.27.3-1.04 1.02-1.04 2.5s1.06 2.9 1.21 3.1c.15.2 2.09 3.2 5.07 4.48.71.3 1.26.49 1.69.63.71.22 1.36.19 1.87.12.57-.09 1.76-.72 2-1.41.25-.7.25-1.29.17-1.41-.07-.12-.27-.2-.57-.35z"/>
  </svg>
</a>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/menu-data.js"></script>
<script src="js/supabase-config.js"></script>
<script src="js/main.js"></script>
</body>
</html>
