<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Los Hermanos — Panel de administración</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="assets/img/logo-mark.png" type="image/png">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-body">

<header class="admin-header">
  <span class="admin-header__mark"><img src="assets/img/logo-mark.png" alt=""></span>
  <span class="admin-header__title">Los Hermanos — Panel de precios</span>
  <button class="btn hidden" id="logoutBtn">Cerrar sesión</button>
</header>

<!-- ===================== LOGIN ===================== -->
<section class="login-wrap" id="loginView">
  <form class="login-card" id="loginForm" novalidate>
    <span class="login-card__mark"><img src="assets/img/logo-mark.png" alt=""></span>
    <h1>Ingresar</h1>
    <p class="sub">Acceso exclusivo del restaurante</p>

    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" autocomplete="username" required>
    </div>
    <div class="field">
      <label for="password">Contraseña</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>
    </div>
    <p class="form-error" id="loginError"></p>
    <button type="submit" class="btn btn--primary" id="loginBtn">Ingresar</button>
    <p class="form-hint" id="configHint"></p>
  </form>
</section>

<!-- ===================== PANEL ===================== -->
<section class="hidden" id="adminView">
  <div class="admin-toolbar">
    <input type="search" id="searchInput" placeholder="Buscar un plato o bebida…">
    <span class="form-hint" id="itemCount"></span>
  </div>
  <div class="admin-list" id="adminList"><!-- generado por JS --></div>
</section>

<div class="save-bar" id="saveBar">
  <span id="saveBarText">0 cambios sin guardar</span>
  <button class="btn" id="discardBtn">Descartar</button>
  <button class="btn btn--primary" id="saveBtn">Guardar cambios</button>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/menu-data.js"></script>
<script src="js/supabase-config.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
